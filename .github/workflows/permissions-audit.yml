name: Permission System Audit

# Validates that the permission catalog stays aligned with backend route gates,
# dashboard PermissionGates, and TPV hasPermission checks. Catches phantom strings
# (gate references a permission no role can satisfy), catalog gaps (route uses a
# permission missing from INDIVIDUAL_PERMISSIONS_BY_RESOURCE), name drift, and
# SUPERADMIN-only orphans.
#
# Runs on every PR touching files that can introduce drift, plus weekly to catch
# regressions in main and to flag drift that came in via sibling-repo changes.

on:
  pull_request:
    paths:
      - 'src/lib/permissions.ts'
      - 'src/routes/**/*.ts'
      - 'src/middlewares/checkPermission*.ts'
      - 'scripts/audit-permissions.ts'
      - 'package.json'
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/lib/permissions.ts'
      - 'src/routes/**/*.ts'
      - 'src/middlewares/checkPermission*.ts'
  schedule:
    # Weekly drift check — Monday 09:00 UTC (03:00 CST). Catches drift that came
    # from sibling repos (dashboard/TPV/android) since we don't checkout those in CI.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Audit permission system
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run permission audit (server-only — sibling repos not checked out in CI)
        run: npm run audit:permissions
      # Note: this CI runs server-self-audit only. For cross-repo audit
      # (validating that dashboard PermissionGate strings and TPV hasPermission
      # strings match this repo's catalog), run `npm run audit:permissions`
      # locally — the script auto-detects sibling repos at ../avoqado-web-dashboard,
      # ../avoqado-tpv, ../avoqado-android.
