name: 📊 Service Monitoring & Health Checks

# 💤 FREE TIER CONFIGURATION
# This monitoring is configured for Render.com FREE tier services
# - Hourly health checks (to avoid spam from sleeping services)
# - Cold start tolerant (waits and retries)
# - Friendly alerts (no panic for normal sleep behavior)
#
# 🚀 TO UPGRADE TO PAID TIER:
# 1. Change cron to '*/15 * * * *' (every 15 minutes)
# 2. Remove cold start retry logic if desired
# 3. Make alerts more strict

on:
  # Schedule drives ONLY the memory-alert job (production is paid / always-on).
  # The legacy health/staging/database jobs are gated to manual-only below to
  # avoid the historical hourly-email noise that caused the schedule to be disabled.
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of check to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - production
          - staging
          - database

permissions:
  contents: read
  issues: write
  actions: write

env:
  PRODUCTION_URL: https://avoqado-server.onrender.com
  STAGING_URL: https://avoqado-server-staging-cm35.onrender.com

jobs:
  # 🏥 Health Check Production
  health-check-production:
    name: 🏥 Production Health Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'production')

    steps:
      - name: 🔍 Production API Health Check (Free Tier Friendly)
        id: prod-health
        run: |
          echo "🔍 Checking production health (allowing for cold start)..."

          # First attempt - might be sleeping
          echo "🌙 First attempt (service might be sleeping)..."
          HEALTH_RESPONSE=$(curl -s --connect-timeout 30 --max-time 60 -w "HTTPSTATUS:%{http_code};TIME:%{time_total}" $PRODUCTION_URL/health || echo "FAILED")

          if [[ $HEALTH_RESPONSE == *"HTTPSTATUS:200"* ]]; then
            TIME=$(echo $HEALTH_RESPONSE | sed 's/.*TIME:\([0-9.]*\).*/\1/')
            echo "✅ Production health check passed on first attempt"
            echo "⏱️ Response time: ${TIME}s"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⏳ First attempt failed (likely cold start), waiting 30s and retrying..."
            sleep 30
            
            # Second attempt - should be warmed up now
            echo "🔄 Second attempt after warmup..."
            HEALTH_RESPONSE=$(curl -s --connect-timeout 30 --max-time 60 -w "HTTPSTATUS:%{http_code};TIME:%{time_total}" $PRODUCTION_URL/health || echo "FAILED")
            
            if [[ $HEALTH_RESPONSE == *"HTTPSTATUS:200"* ]]; then
              TIME=$(echo $HEALTH_RESPONSE | sed 's/.*TIME:\([0-9.]*\).*/\1/')
              echo "✅ Production health check passed after warmup"
              echo "⏱️ Response time: ${TIME}s (includes cold start)"
              echo "status=healthy" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Production service appears to be down or having issues"
              echo "Response: $HEALTH_RESPONSE"
              echo "status=unhealthy" >> $GITHUB_OUTPUT
              echo "💡 Note: This might be normal for Render.com free tier cold starts"
            fi
          fi

      - name: 🔍 Production API Endpoints Check
        if: steps.prod-health.outputs.status == 'healthy'
        run: |
          echo "🔍 Testing production API endpoints..."

          # Test auth endpoint (should return 401 without token)
          AUTH_RESPONSE=$(curl -s -w "%{http_code}" $PRODUCTION_URL/api/auth/me -o /dev/null || echo "FAILED")
          if [[ $AUTH_RESPONSE == "401" ]]; then
            echo "✅ Auth endpoint responding correctly (401 without token)"
          else
            echo "⚠️ Auth endpoint unexpected response: $AUTH_RESPONSE"
          fi

          # Test CORS headers
          CORS_HEADERS=$(curl -s -H "Origin: https://dashboard.avoqado.io" -I $PRODUCTION_URL/health | grep -i "access-control" || echo "No CORS headers")
          echo "🌐 CORS headers: $CORS_HEADERS"

      - name: 📊 Production Performance Check
        if: steps.prod-health.outputs.status == 'healthy'
        run: |
          echo "📊 Checking production performance..."

          # Measure response time
          RESPONSE_TIME=$(curl -s -w "%{time_total}" -o /dev/null $PRODUCTION_URL/health || echo "0")
          echo "⏱️ Response time: ${RESPONSE_TIME}s"

          # Check if response time is acceptable (< 3 seconds)
          if (( $(echo "$RESPONSE_TIME < 3.0" | bc -l) )); then
            echo "✅ Response time is acceptable"
          else
            echo "⚠️ Response time is slow: ${RESPONSE_TIME}s"
          fi

      - name: 📋 Production Health Report
        if: steps.prod-health.outputs.status == 'unhealthy'
        run: |
          echo "📋 Production Health Check Report"
          echo "Time: $(date -u)"
          echo "Service: Production API"
          echo "URL: $PRODUCTION_URL/health"
          echo "Status: Service appears to be sleeping or slow to respond"
          echo "💡 This is normal behavior for Render.com free tier"
          echo "🔄 Service will warm up when users access it"
          echo "⚠️ Only investigate if this persists for multiple hours"

  # 🧪 Health Check Staging
  health-check-staging:
    name: 🧪 Staging Health Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'staging')

    steps:
      - name: 🔍 Staging API Health Check (Free Tier Friendly)
        id: staging-health
        run: |
          echo "🔍 Checking staging health (allowing for cold start)..."

          # Single attempt with longer timeout for staging
          HEALTH_RESPONSE=$(curl -s --connect-timeout 30 --max-time 60 -w "HTTPSTATUS:%{http_code};TIME:%{time_total}" $STAGING_URL/health || echo "FAILED")

          if [[ $HEALTH_RESPONSE == *"HTTPSTATUS:200"* ]]; then
            TIME=$(echo $HEALTH_RESPONSE | sed 's/.*TIME:\([0-9.]*\).*/\1/')
            echo "✅ Staging health check passed"
            echo "⏱️ Response time: ${TIME}s"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Staging health check failed (expected for free tier)"
            echo "Response: $HEALTH_RESPONSE"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "💡 Staging service is likely sleeping - this is normal"
          fi

      - name: 🔍 Staging API Endpoints Check
        if: steps.staging-health.outputs.status == 'healthy'
        run: |
          echo "🔍 Testing staging API endpoints..."

          # Test basic endpoints
          curl -s -f $STAGING_URL/health > /dev/null && echo "✅ Health endpoint OK"

      - name: ⚠️ Staging Warning
        if: steps.staging-health.outputs.status == 'unhealthy'
        run: |
          echo "⚠️ STAGING WARNING: Health check failed!"
          echo "Time: $(date -u)"
          echo "Service: Staging API"
          echo "URL: $STAGING_URL/health"
          echo "This is non-critical but should be investigated"

  # 🗄️ Database Health Check
  database-health-check:
    name: 🗄️ Database Health Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'database')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Check database connectivity
        run: |
          echo "🗄️ Checking database health via API..."

          # Check if the API can connect to database by testing a simple endpoint
          # The /health endpoint should include database connectivity status

          PROD_DB_CHECK=$(curl -s $PRODUCTION_URL/health | jq -r '.database // "unknown"' || echo "failed")
          STAGING_DB_CHECK=$(curl -s $STAGING_URL/health | jq -r '.database // "unknown"' || echo "failed")

          echo "📊 Production database status: $PROD_DB_CHECK"
          echo "📊 Staging database status: $STAGING_DB_CHECK"

          if [[ $PROD_DB_CHECK == "healthy" || $PROD_DB_CHECK == "ok" ]]; then
            echo "✅ Production database is healthy"
          else
            echo "❌ Production database issue detected"
            exit 1
          fi

  # 🧠 Production Memory Alert (pre-OOM early warning) — the ONLY scheduled job
  memory-alert-production:
    name: 🧠 Production Memory Alert
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'production'))

    steps:
      - name: 🧠 Read production memory metrics
        id: mem
        run: |
          echo "🧠 Fetching production memory metrics..."
          METRICS=$(curl -s --connect-timeout 15 --max-time 30 "$PRODUCTION_URL/api/public/metrics" || echo '{}')
          RSS_PCT=$(echo "$METRICS" | jq -r '.memory.rssPercent // empty')
          RSS_MB=$(echo "$METRICS" | jq -r '.memory.rssMb // empty')
          LIMIT_MB=$(echo "$METRICS" | jq -r '.memory.limitMb // empty')
          HEAP_MB=$(echo "$METRICS" | jq -r '.memory.heapUsedMb // empty')
          EL_P99=$(echo "$METRICS" | jq -r '.eventLoop.lagP99Ms // empty')

          if [ -z "$RSS_PCT" ]; then
            echo "⚠️ Could not read /api/public/metrics (service may be down). Skipping."
            echo "status=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📊 RSS ${RSS_MB}MB / ${LIMIT_MB}MB = ${RSS_PCT}% | heap ${HEAP_MB}MB | eventLoop p99 ${EL_P99}ms"
          echo "rss_pct=$RSS_PCT" >> "$GITHUB_OUTPUT"
          echo "rss_mb=$RSS_MB" >> "$GITHUB_OUTPUT"
          echo "limit_mb=$LIMIT_MB" >> "$GITHUB_OUTPUT"
          echo "heap_mb=$HEAP_MB" >> "$GITHUB_OUTPUT"

          # Pre-OOM threshold: warn at 80% of the container limit (plan-agnostic).
          if (( $(echo "$RSS_PCT >= 80" | bc -l) )); then
            echo "🚨 Memory above threshold: ${RSS_PCT}% >= 80%"
            echo "status=breach" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Memory healthy: ${RSS_PCT}% < 80%"
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚨 Open/refresh memory alert issue
        if: steps.mem.outputs.status == 'breach'
        uses: actions/github-script@v7
        with:
          script: |
            const rssPct = '${{ steps.mem.outputs.rss_pct }}';
            const rssMb = '${{ steps.mem.outputs.rss_mb }}';
            const limitMb = '${{ steps.mem.outputs.limit_mb }}';
            const heapMb = '${{ steps.mem.outputs.heap_mb }}';
            const body = [
              `Production RSS at **${rssPct}%** (${rssMb}MB / ${limitMb}MB), heap ${heapMb}MB — ${new Date().toISOString()}.`,
              ``,
              `Threshold: 80% of the container limit (pre-OOM warning). Likely causes: concurrent heavy analytics loads (PlayTelecom sale-verifications / stores-analysis), an Excel export, or a memory leak.`,
              `Action: review the audited SQL-aggregation fix before this becomes an OOM restart.`,
              ``,
              `_Source: /api/public/metrics via .github/workflows/monitoring.yml_`,
            ].join('\n');
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'memory-alert',
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '🚨 Production memory high (avoqado-server)',
                body, labels: ['memory-alert'],
              });
            }

  # 📊 Generate Health Report
  health-report:
    name: 📊 Generate Health Report
    runs-on: ubuntu-latest
    needs: [health-check-production, health-check-staging, database-health-check]
    if: always() && github.event_name == 'workflow_dispatch'

    steps:
      - name: 📊 Generate comprehensive health report
        run: |
          echo "# 📊 Avoqado System Health Report"
          echo "Generated at: $(date -u)"
          echo ""

          echo "## 🏭 Production Status"
          if [[ "${{ needs.health-check-production.result }}" == "success" ]]; then
            echo "✅ Production: Healthy"
          else
            echo "❌ Production: Issues detected"
          fi

          echo ""
          echo "## 🧪 Staging Status"
          if [[ "${{ needs.health-check-staging.result }}" == "success" ]]; then
            echo "✅ Staging: Healthy"
          else
            echo "⚠️ Staging: Issues detected"
          fi

          echo ""
          echo "## 🗄️ Database Status"
          if [[ "${{ needs.database-health-check.result }}" == "success" ]]; then
            echo "✅ Database: Healthy"
          else
            echo "❌ Database: Issues detected"
          fi

          echo ""
          echo "## 🔍 Next Steps"
          if [[ "${{ needs.health-check-production.result }}" != "success" ]]; then
            echo "1. ⚠️ **URGENT**: Investigate production issues immediately"
            echo "2. Check Render.com dashboard for production service status"
            echo "3. Review recent deployments and changes"
          fi

          if [[ "${{ needs.database-health-check.result }}" != "success" ]]; then
            echo "1. ⚠️ Check database connectivity and performance"
            echo "2. Review database logs in provider dashboard"
            echo "3. Check for any ongoing maintenance"
          fi

          if [[ "${{ needs.health-check-staging.result }}" != "success" ]]; then
            echo "1. 🔧 Investigate staging issues (lower priority)"
            echo "2. Ensure staging environment is properly configured"
          fi
