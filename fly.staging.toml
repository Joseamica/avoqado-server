# fly.staging.toml — entorno STAGING de avoqado-server.
# ======================================================
# Para uso interno / del nuevo empleado. NUNCA apunta a la base de datos productiva.
#
# Deploy:  fly deploy --config fly.staging.toml
#
# COSTO: esta app AUTO-DUERME cuando nadie la usa (min_machines_running = 0).
# Solo se cobra mientras realmente atiende requests — centavos al mes para
# el uso de una sola persona.

app = 'avoqado-server-staging'
primary_region = 'dfw'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = 'npx prisma migrate deploy'
  release_command_timeout = '5m'

# VM más grande solo para correr las migraciones (Prisma CLI consume RAM).
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['release_command']

[env]
  NODE_ENV = 'production'          # corre en modo prod, pero contra la DB de STAGING
  NODE_OPTIONS = '--max-old-space-size=800'

[http_service]
  internal_port = 3000
  force_https = true
  # AHORRO: duerme al estar inactivo, despierta con el primer request.
  # min = 0  →  ~$0 cuando nadie lo usa.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# VM del server. 1gb (prod usa 512mb) para evitar los crashes por falta de
# memoria — causa probable de los "muchos errores" del staging anterior.
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['app']
